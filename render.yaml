services:
  - type: web
    name: interviewpilot-ai-server
    runtime: node
    plan: free
    repo: https://github.com/Avivmorad/InterviewPilot-AI
    branch: main
    autoDeployTrigger: commit
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://interviewpilot-ai-bice.vercel.app,https://interviewpilot-ai-avivmoradteam.vercel.app,https://interviewpilot-ai-git-final-report-mvp-flow-avivmoradteam.vercel.app
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
